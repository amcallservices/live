services:
  - type: web
    name: aste-giudiziarie
    region: frankfurt
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: BASE_URL
        value: https://aste-giudiziarie.onrender.com